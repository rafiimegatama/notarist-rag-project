# ─────────────────────────────────────────────────────────────────────────────
# HYBRID boot — the smallest executable environment that proves:
#   Docker → Spring Boot → REAL Supabase → REAL GCS → Application READY
#
# Contains ONLY the application container. It connects OUT to:
#   • REAL Supabase PostgreSQL   (POSTGRES_URL, transaction pooler :6543)
#   • REAL Google Cloud Storage  (GCS_BUCKET + a mounted service-account key)
#
# It deliberately runs NONE of the optional services — no local Postgres, no MinIO,
# no storage emulator, no Qdrant, no Ollama, no OCR/NER/embedding sidecars. By
# OperationalDegradationHierarchy.evaluate(), those degrade the system to at most
# SEARCH_ONLY / LIMITED_SEARCH / DEGRADED — none of which is >= EMERGENCY, so
# readiness stays 200 READY. Only PostgreSQL (CRITICAL) or GCS (EMERGENCY) can gate it.
#
# Run:
#   cp .env.hybrid.example .env.hybrid   # then fill in REAL values
#   docker compose -f docker-compose.hybrid.yml --env-file .env.hybrid up --build
# ─────────────────────────────────────────────────────────────────────────────
services:
  app:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    container_name: notarist-app
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      PORT: 8080

      # ---- REAL Supabase PostgreSQL (mandatory — CRITICAL if down) ----
      POSTGRES_URL: ${POSTGRES_URL}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_POOL_MAX: ${POSTGRES_POOL_MAX:-8}

      # ---- REAL Google Cloud Storage (mandatory — EMERGENCY if down) ----
      GCS_BUCKET: ${GCS_BUCKET}
      GCS_AUTO_CREATE_BUCKET: "false"                 # bucket is provisioned out of band; verify only
      GOOGLE_CLOUD_PROJECT: ${GOOGLE_CLOUD_PROJECT}
      GOOGLE_APPLICATION_CREDENTIALS: /secrets/gcs-key.json
      GCS_SIGNING_SERVICE_ACCOUNT: ${GCS_SIGNING_SERVICE_ACCOUNT:-}

      # ---- JWT signing keys (mandatory — read at startup) ----
      JWT_PRIVATE_KEY_PATH: /etc/notarist/keys/private.pem
      JWT_PUBLIC_KEY_PATH: /etc/notarist/keys/public.pem

      # ---- OCR endpoint: property must be SET, but the OCR service is OPTIONAL and not run.
      #      Fail-fast + startup probe off so an unreachable OCR endpoint does not block boot. ----
      OCR_ENDPOINT: ${OCR_ENDPOINT:-http://ocr.disabled.invalid:8081}
      OCR_PROBE_ON_STARTUP: "false"
      OCR_FAIL_FAST: "false"
    volumes:
      # A real service-account key JSON (real GCS auth — not a mock).
      - ${GCS_CREDENTIALS_PATH}:/secrets/gcs-key.json:ro
      # Directory containing private.pem + public.pem (RS256).
      - ${JWT_KEYS_DIR}:/etc/notarist/keys:ro
    restart: "no"
    networks:
      - notarist-hybrid-net

networks:
  notarist-hybrid-net:
    name: notarist_hybrid_network
    driver: bridge
