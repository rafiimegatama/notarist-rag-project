# Declarative Cloud Run service (alternative to deploy.sh, for GitOps).
# Apply with:  gcloud run services replace deploy/cloudrun/service.yaml --region=REGION
# Replace every <PLACEHOLDER> before applying.
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: notarist-backend
  labels:
    app: notarist
  annotations:
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        # min 1 instance + CPU always allocated: the @Scheduled ingestion queue poller must run
        # between HTTP requests. With the defaults (minScale 0, request-scoped CPU) ingestion
        # would stall whenever the service is idle.
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "5"
        run.googleapis.com/cpu-throttling: "false"
        run.googleapis.com/startup-cpu-boost: "true"
    spec:
      # Cloud Run's SIGTERM→SIGKILL grace; keep >= spring.lifecycle.timeout-per-shutdown-phase.
      timeoutSeconds: 300
      containerConcurrency: 40
      serviceAccountName: <RUNTIME_SA>   # e.g. notarist-run@<PROJECT_ID>.iam.gserviceaccount.com
      containers:
        - image: <REGION>-docker.pkg.dev/<PROJECT_ID>/notarist/notarist-backend:latest
          ports:
            - name: http1
              containerPort: 8080
          resources:
            limits:
              cpu: "1"
              memory: 1Gi
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: prod
            - name: GOOGLE_CLOUD_PROJECT
              value: <PROJECT_ID>
            - name: GCS_BUCKET
              value: <GCS_BUCKET>
            - name: GCS_SIGNING_SERVICE_ACCOUNT
              value: <RUNTIME_SA>
            - name: GCS_AUTO_CREATE_BUCKET
              value: "false"
            - name: POSTGRES_URL
              value: <SUPABASE_JDBC_URL>          # jdbc:postgresql://<host>:5432/postgres?sslmode=require
            - name: POSTGRES_USER
              value: <SUPABASE_USER>
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: POSTGRES_PASSWORD
                  key: latest
            - name: APP_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: APP_ENCRYPTION_KEY
                  key: latest
            - name: APP_ENCRYPTION_SALT
              valueFrom:
                secretKeyRef:
                  name: APP_ENCRYPTION_SALT
                  key: latest
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            periodSeconds: 30
